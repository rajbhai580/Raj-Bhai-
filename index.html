<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINGO ROOT AI // BIG-SMALL ANALYZER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <header>
            <h1>[ WINGO V2.0 // DEEP AI ]</h1>
            <p id="system-status" class="offline">STATUS: SYSTEM OFFLINE</p>
        </header>

        <div class="main-panel">
            <div class="data-stream">
                <h3>[ LIVE DATA STREAM ]</h3>
                <table>
                    <thead>
                        <tr><th>PERIOD</th><th>SIZE</th><th>NUMBER</th></tr>
                    </thead>
                    <tbody id="history-list">
                        <!-- Data loads here -->
                    </tbody>
                </table>
            </div>

            <div class="prediction-panel">
                <h3>[ AI PREDICTION ENGINE ]</h3>
                <div class="target-period">TARGET PERIOD: <span id="next-period">---</span></div>
                
                <div class="result-box" id="prediction-result">SYSTEM INACTIVE</div>
                
                <div class="number-guess">
                    <p>PROBABLE NUMBERS:</p>
                    <div id="predicted-numbers">[ - ] [ - ] [ - ]</div>
                </div>

                <div class="logic-used" id="logic-applied">Waiting for initialization...</div>

                <button class="hack-btn" onclick="executeAnalysis()" id="analyze-btn" disabled>EXECUTE DEEP ANALYSIS</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="app.js"></script>
</body>
</html>
