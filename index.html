<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINGO AI PREDICTOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <header>
            <h1>[ WINGO AI PREDICTOR ]</h1>
            <p id="system-status" class="offline">STATUS: SYSTEM OFFLINE (COLLECTING DATA...)</p>
        </header>

        <div class="main-panel">
            <div class="data-stream">
                <h3>[ LIVE DATA STREAM ]</h3>
                <table>
                    <thead>
                        <tr><th>PERIOD</th><th>RESULT</th><th>NUMBER</th></tr>
                    </thead>
                    <tbody id="history-list">
                        <!-- Data loads here -->
                    </tbody>
                </table>
            </div>

            <div class="prediction-panel">
                <h3>[ AI PREDICTION ]</h3>
                <div class="target-period">TARGET PERIOD: <span id="next-period">---</span></div>
                <div class="result-box" id="prediction-result">SYSTEM IS INACTIVE</div>
                <button class="hack-btn" onclick="executeAnalysis()" id="analyze-btn" disabled>INITIALIZE ANALYSIS</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="app.js"></script>
</body>
</html>
