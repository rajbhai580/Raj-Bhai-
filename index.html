<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Trading Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ট্রেডিং এনালাইজার টুল</h1>
        
        <div class="card">
            <h2>পূর্বের রেজাল্ট (History)</h2>
            <ul id="history-list">
                <!-- Data will load here via JavaScript -->
            </ul>
        </div>

        <div class="card prediction-box">
            <h2>পরবর্তী প্রেডিকশন</h2>
            <p id="prediction-result">এনালাইজ করা হচ্ছে...</p>
            <button onclick="analyzeData()">প্রেডিকশন আপডেট করুন</button>
        </div>
    </div>

    <!-- Firebase SDK (Google Console) -->
    <script type="module" src="app.js"></script>
</body>
</html>
